# Portainer / server deploy: uses the image built and pushed by GitHub Actions to GHCR.
# In Portainer: Stacks → Add stack → Web editor → paste this file, or set "Repository URL"
# to this compose file on GitHub (raw).
version: '3.8'

services:
  youtube-downloader:
    image: ghcr.io/lutfullahkabalak/youtube-downloader:latest
    ports:
      - "3837:3837"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - PORT=3837
    restart: unless-stopped
